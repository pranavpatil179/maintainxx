name: Keep Vercel Backend Warm

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel API Health Check
        run: |
          curl -sS https://backend-blush-seven-20.vercel.app/api/health
